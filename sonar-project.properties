# Required metadata
sonar.projectKey=projet43
sonar.projectName=projet43

# Path to the project base directory
sonar.projectBaseDir=.

# Language
sonar.language=java

# Source directories
sonar.sources=src/main/java,src/main/webapp/app

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Test-related properties (Java)
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.test.libraries=target/test-results/**/*.jar
sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

# Coverage reports (JaCoCo for Java, LCOV for JavaScript/TypeScript)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml
sonar.javascript.lcov.reportPaths=target/test-results/jest/lcov.info